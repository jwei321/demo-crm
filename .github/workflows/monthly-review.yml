name: Monthly Hub review

# Once a month, review how the Hub is doing and what to add next. Writes a dated
# section to docs/MONTHLY_REVIEW.md and opens a GitHub issue with the same body
# so it lands in your inbox.
on:
  schedule:
    # 01:00 UTC on the 1st of each month
    - cron: "0 1 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate review
        id: gen
        env:
          REVIEW_BODY_OUT: ${{ runner.temp }}/review-body.md
        run: node scripts/monthly-review.mjs

      - name: Commit review doc if changed
        run: |
          if [[ -n "$(git status --porcelain docs/MONTHLY_REVIEW.md)" ]]; then
            git config user.name "market-hub-bot"
            git config user.email "actions@github.com"
            git add docs/MONTHLY_REVIEW.md
            git commit -m "docs(hub): monthly review ($(date -u +%Y-%m))"
            git push
          else
            echo "No change to review doc."
          fi

      - name: Open review issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.RUNNER_TEMP + '/review-body.md', 'utf8');
            const title = '${{ steps.gen.outputs.title }}' || 'Monthly Hub review';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['hub-review'],
            });
